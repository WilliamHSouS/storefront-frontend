name: Preview
on:
  deployment_status:

jobs:
  lighthouse:
    name: Lighthouse CI
    if: >
      github.event.deployment_status.state == 'success' &&
      github.event.deployment_status.environment == 'Preview'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm install -g @lhci/cli@0.14.x
      - run: lhci autorun --collect.url="$LHCI_TARGET_URL/nl/"
        env:
          LHCI_TARGET_URL: ${{ github.event.deployment_status.target_url }}

  smoke:
    name: Smoke Test
    if: >
      github.event.deployment_status.state == 'success' &&
      github.event.deployment_status.environment == 'Preview'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      # Run smoke tests against local dev server + mock API (same as regular
      # E2E) rather than the live Vercel preview. The preview has no test data,
      # so functional assertions like "Bar Sumac" would fail. Lighthouse CI
      # handles live preview validation (perf + accessibility).
      - run: pnpm exec playwright test e2e/smoke.spec.ts --project=desktop
        env:
          CI: 'true'
          API_BASE_URL: http://localhost:4322
          PUBLIC_API_BASE_URL: http://localhost:4322
          DEFAULT_MERCHANT: bar-sumac
          CUSTOM_DOMAINS: '{}'
