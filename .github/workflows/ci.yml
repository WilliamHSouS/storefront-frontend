name: CI
on:
  pull_request:
  push:
    branches: [main]
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm check

  unit-test:
    name: Unit Tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:coverage
      - uses: actions/upload-artifact@v4
        with: { name: coverage-report, path: coverage/, retention-days: 7 }

  contract:
    name: Contract Tests
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Checkout backend OpenAPI spec
        uses: actions/checkout@v4
        with:
          repository: Acroya-B-V/storefront-backend
          token: ${{ secrets.BACKEND_REPO_TOKEN || github.token }}
          path: backend
          sparse-checkout: storefront_backend/openapi/openapi.storefront.v1.json
          sparse-checkout-cone-mode: false
        continue-on-error: true
        id: spec-checkout
      - name: Skip if spec unavailable
        if: steps.spec-checkout.outcome == 'failure'
        run: echo "::warning::Backend OpenAPI spec not available — skipping contract tests. Configure BACKEND_REPO_TOKEN secret for cross-repo access."
      - uses: pnpm/action-setup@v4
        if: steps.spec-checkout.outcome == 'success'
      - uses: actions/setup-node@v4
        if: steps.spec-checkout.outcome == 'success'
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
        if: steps.spec-checkout.outcome == 'success'
      - run: pnpm exec playwright install --with-deps chromium
        if: steps.spec-checkout.outcome == 'success'
      - name: Start mock API server
        if: steps.spec-checkout.outcome == 'success'
        run: npx tsx e2e/helpers/mock-api.ts &
        env:
          PORT: '4322'
      - name: Wait for mock API server
        if: steps.spec-checkout.outcome == 'success'
        run: sleep 3
      - name: Run contract tests
        if: steps.spec-checkout.outcome == 'success'
        run: pnpm exec playwright test e2e/contract.spec.ts --project=desktop --reporter=list
        env:
          CI: 'true'
          BASE_URL: http://localhost:4321
          OPENAPI_SPEC_PATH: ${{ github.workspace }}/backend/storefront_backend/openapi/openapi.storefront.v1.json
          API_BASE_URL: http://localhost:4322
          PUBLIC_API_BASE_URL: http://localhost:4322
          DEFAULT_MERCHANT: bar-sumac
          CUSTOM_DOMAINS: '{}'
      - uses: actions/upload-artifact@v4
        if: failure() && steps.spec-checkout.outcome == 'success'
        with: { name: contract-report, path: e2e/.report/, retention-days: 7 }

  e2e:
    name: E2E Tests
    needs: unit-test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
        env:
          CI: 'true'
          API_BASE_URL: http://localhost:4322
          PUBLIC_API_BASE_URL: http://localhost:4322
          DEFAULT_MERCHANT: bar-sumac
          CUSTOM_DOMAINS: '{}'
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: e2e-report, path: e2e/.report/, retention-days: 7 }

  bundle-size:
    name: Bundle Size
    needs: lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
        env:
          API_BASE_URL: https://api.example.com
          PUBLIC_API_BASE_URL: https://api.example.com
          DEFAULT_MERCHANT: bar-sumac
          CUSTOM_DOMAINS: '{}'
      - run: pnpm size:check

  dep-audit:
    name: Dependency Audit
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --prod --audit-level=high
